<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professor.py</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,300&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="shell">
  <header>
    <div class="logo">Professor<span>.py</span></div>
    <div class="tagline">Python via Java — transferência de conhecimento</div>
    <div class="badges">
      <span class="badge badge-py">Python</span>
      <span class="badge badge-java">Java</span>
    </div>
  </header>

  <div id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">⟨/⟩</div>
      <h2>Olá, Bruno.</h2>
      <p>Pergunte qualquer conceito Python. Cada explicação vem com o equivalente em Java do lado.</p>
      <div class="suggestions">
        <span class="sug" onclick="ask(this)">listas vs ArrayList</span>
        <span class="sug" onclick="ask(this)">classes e self</span>
        <span class="sug" onclick="ask(this)">decorators</span>
        <span class="sug" onclick="ask(this)">async/await</span>
        <span class="sug" onclick="ask(this)">dicionários</span>
        <span class="sug" onclick="ask(this)">list comprehension</span>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <textarea id="input" placeholder="Pergunte sobre Python..." rows="1"></textarea>
    <button id="send-btn" onclick="send()">Enviar →</button>
  </div>
</div>

<script>
  const chat    = document.getElementById('chat');
  const input   = document.getElementById('input');
  const sendBtn = document.getElementById('send-btn');

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });

  function ask(el) {
    input.value = el.textContent;
    send();
  }

  function send() {
    const text = input.value.trim();
    if (!text) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    addMessage(text, 'user');
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinking = addThinking();

    fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pergunta: text })
    })
    .then(r => r.json())
    .then(data => {
      thinking.remove();
      addMessage(data.resposta, 'prof');
    })
    .catch(() => {
      thinking.remove();
      addMessage('Erro ao conectar com o professor. Verifique se o servidor está rodando.', 'prof');
    })
    .finally(() => { sendBtn.disabled = false; input.focus(); });
  }

  function addMessage(text, who) {
    const wrap = document.createElement('div');
    wrap.className = `msg msg-${who}`;

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = who === 'user' ? 'você' : 'professor.py';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = who === 'prof' ? renderMarkdown(text) : escapeHtml(text);

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function addThinking() {
    const wrap = document.createElement('div');
    wrap.className = 'msg msg-prof msg-thinking';

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'professor.py';

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = '<div class="dot-pulse"><span></span><span></span><span></span></div>';

    wrap.appendChild(label);
    wrap.appendChild(bubble);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
    return wrap;
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    text = text.replace(/```(python|java|py)?\n?([\s\S]*?)```/gi, (_, lang, code) => {
      const l = (lang || '').toLowerCase().replace('py', 'python');
      const tag = l ? `<div class="lang-tag lang-${l}">${l}</div>` : '';
      return `${tag}<pre><code>${escapeHtml(code.trim())}</code></pre>`;
    });
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    text = text.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    text = text.replace(/^#{1,3} (.+)$/gm, '<strong style="font-size:14px;color:#fff;display:block;margin:12px 0 4px">$1</strong>');
    text = text.replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">');
    text = text.replace(/\n/g, '<br>');
    return text;
  }
</script>
</body>
</html>
